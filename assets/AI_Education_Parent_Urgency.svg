<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E2761"/>
      <stop offset="100%" stop-color="#0F1742"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F1742" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#FFFFFF"/>

  <!-- Top navy band -->
  <rect x="0" y="0" width="1200" height="100" fill="url(#bg)"/>
  <rect x="0" y="100" width="1200" height="6" fill="#F96167"/>

  <!-- Eyebrow + lead-in -->
  <text x="60" y="50" fill="#CADCFC" font-size="13" font-weight="700" letter-spacing="3">FOR CANADIAN PARENTS</text>
  <text x="60" y="82" fill="#FFFFFF" font-size="26" font-weight="700">Your child's future career is already being rewritten by AI.</text>

  <!-- Hero stat block (left) -->
  <g transform="translate(60,150)">
    <text x="0" y="40" fill="#1E2761" font-size="20" font-weight="700">THE CAREERS THEY'RE STUDYING FOR</text>

    <!-- The big number -->
    <text x="20" y="200" fill="#1E2761" font-size="170" font-weight="800">86%</text>

    <!-- Below the big number: explanation -->
    <text x="0" y="260" fill="#0F1742" font-size="22" font-weight="600">of university-educated Canadian workers</text>
    <text x="0" y="295" fill="#0F1742" font-size="22" font-weight="600">are already in jobs being transformed by AI.</text>

    <text x="0" y="345" fill="#6B7280" font-size="14" font-style="italic">— Statistics Canada, 2024 (vs. 38% for high-school-only workers)</text>

    <!-- Insight -->
    <rect x="0" y="380" width="6" height="100" rx="3" fill="#F96167"/>
    <text x="22" y="408" fill="#1E2761" font-size="18" font-weight="700">The more education your child pursues,</text>
    <text x="22" y="436" fill="#1E2761" font-size="18" font-weight="700">the more AI will define their work.</text>
    <text x="22" y="466" fill="#6B7280" font-size="14">University-bound students are heading directly into AI-driven careers.</text>
  </g>

  <!-- Right column: three quick urgency stats stacked -->
  <g transform="translate(720,150)">
    <text x="0" y="40" fill="#1E2761" font-size="20" font-weight="700">AND IT'S HAPPENING NOW</text>

    <!-- Stat 1 -->
    <g transform="translate(0,70)" filter="url(#shadow)">
      <rect width="420" height="115" rx="10" fill="#F7F9FC" stroke="#E5E9F2"/>
      <rect width="6" height="115" rx="3" fill="#F96167"/>
      <text x="22" y="55" fill="#1E2761" font-size="40" font-weight="800">6.1% → 12.2%</text>
      <text x="22" y="82" fill="#0F1742" font-size="14" font-weight="600">Canadian business AI adoption DOUBLED in one year</text>
      <text x="22" y="103" fill="#6B7280" font-size="11" font-style="italic">Statistics Canada, 2024 → 2025</text>
    </g>

    <!-- Stat 2 -->
    <g transform="translate(0,205)" filter="url(#shadow)">
      <rect width="420" height="115" rx="10" fill="#F7F9FC" stroke="#E5E9F2"/>
      <rect width="6" height="115" rx="3" fill="#F96167"/>
      <text x="22" y="55" fill="#1E2761" font-size="40" font-weight="800">+78% / +24%</text>
      <text x="22" y="82" fill="#0F1742" font-size="14" font-weight="600">AI job postings grew 3× faster than qualified talent</text>
      <text x="22" y="103" fill="#6B7280" font-size="11" font-style="italic">LinkedIn / Gloat, 2026</text>
    </g>

    <!-- Stat 3 -->
    <g transform="translate(0,340)" filter="url(#shadow)">
      <rect width="420" height="115" rx="10" fill="#F7F9FC" stroke="#E5E9F2"/>
      <rect width="6" height="115" rx="3" fill="#F96167"/>
      <text x="22" y="55" fill="#1E2761" font-size="40" font-weight="800">59%</text>
      <text x="22" y="82" fill="#0F1742" font-size="14" font-weight="600">of Canadian students already use AI — without guidance</text>
      <text x="22" y="103" fill="#6B7280" font-size="11" font-style="italic">KPMG Canada, 2024 — 2/3 say they're learning less</text>
    </g>
  </g>

  <!-- Bottom CTA bar -->
  <rect x="0" y="700" width="1200" height="100" fill="#1E2761"/>
  <text x="60" y="745" fill="#FFFFFF" font-size="22" font-weight="700">Universities will assume AI fluency. High schools don't yet teach it.</text>
  <text x="60" y="778" fill="#CADCFC" font-size="20" font-weight="600">We close that gap — starting in high school, before it becomes a deficit they have to catch up on.</text>
</svg>
